<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-ZONE | Digital Ops</title>
    <style>
        /* --- CSS STYLING --- */
        :root {
            --bg-black: #050505;
            --card-bg: #111111;
            --orange: #ff6600;
            --orange-dim: #cc5200;
            --text-white: #ffffff;
            --text-gray: #999999;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-black);
            color: var(--text-white);
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            border-bottom: 2px solid var(--orange);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--orange);
            letter-spacing: 2px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }

        .nav-links li a {
            text-decoration: none;
            color: var(--text-white);
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .nav-links li a:hover, .nav-links li a.active {
            color: var(--orange);
            text-shadow: 0 0 10px var(--orange);
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            color: var(--orange);
            font-size: 2.8rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* Grid */
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Card with Hover Effect */
        .event-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .event-card:hover {
            transform: translateY(-12px);
            border-color: var(--orange);
            box-shadow: 0 10px 40px rgba(255, 102, 0, 0.2);
        }

        .event-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #222;
        }

        .event-info {
            padding: 25px;
            flex-grow: 1;
        }

        .event-info h3 {
            margin: 0 0 12px 0;
            color: var(--orange);
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        .event-info p {
            font-size: 0.9rem;
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 12px;
            padding: 0 25px 25px 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-register {
            background: var(--orange);
            color: #000;
        }

        .btn-register:hover {
            background: var(--text-white);
        }

        .btn-know {
            background: transparent;
            color: var(--orange);
            border: 1px solid var(--orange);
        }

        .btn-know:hover {
            background: rgba(255, 102, 0, 0.1);
        }

        footer {
            text-align: center;
            padding: 60px;
            color: #333;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">EVENTS-ZONE</div>
        <ul class="nav-links">
            <li><a id="ongoing-tab" onclick="render('ongoing')" >ONGOING EVENTS</a></li>
            <li><a id="upcoming-tab" onclick="render('upcoming')">UPCOMING EVENTS</a></li>
        </ul>
    </nav>

    <main class="container">
        <header>
            <h1 id="page-title">Ongoing Events</h1>
            <!-- <h1 id="page-title">Ongoing Events</h1> -->
            <p style="color: #555;">Select an active sector to proceed with registration.</p>
        </header>

        <div id="grid" class="event-grid">
            </div>
    </main>

    <footer>&copy; 2026 O-ZONE COMMAND CENTER</footer>

    <script>
        const database = {
            ongoing: [
                { title: "HACKATHON", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500", desc: "48 hours of intense coding and hardware exploitation." },
                { title: "MYSTIC VAULT", img: "https://images.unsplash.com/photo-1510070112810-d4e9a46d9e91?w=400", desc: "Decipher the ancient digital codes hidden in the server." },
                { title: "VAULT OF TRIALS", img: "https://images.unsplash.com/photo-1551434678-e076c223a692?w=400", desc: "A gauntlet of cybersecurity puzzles for the brave." },
                { title: "ECO CANVAS", img: "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=400", desc: "Digital art movement focused on environmental repair." },
                { title: "MAYDAY", img: "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=400", desc: "Global stress-test simulation for emergency protocols." },
                { title: "THE CRISIS MARKET", img: "https://img.freepik.com/premium-vector/crisis-stock-crash-market-loss-trading-investment-indicators-downturn-vector-stock-exchange-market-financial-business-crisis-economic-fall-down-with-flow-charts-diagram_8071-6534.jpg?w=360", desc: "Trade assets in a simulated high-stakes economic collapse." }
            ],
            upcoming: [
                { title: "CODEATHON", img: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500", desc: "The regional qualifiers for the next major coding league." },
                { title: "SPARK GRID", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500", desc: "Revolutionizing distributed energy grids via smart contracts." },
                { title: "CHAINREACTION", img: "https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=500", desc: "Exploring the limits of blockchain scalability and speed." },
                { title: "TREBLE CLEF", img: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=500", desc: "AI-driven musical composition and sound design festival." }
            ]
        };

        function render(type) {
            const grid = document.getElementById('grid');
            const title = document.getElementById('page-title');
            
            // Tab Toggle
            document.getElementById('ongoing-tab').classList.toggle('active', type === 'ongoing');
            document.getElementById('upcoming-tab').classList.toggle('active', type === 'upcoming');
            title.innerText = type === 'ongoing' ? "Ongoing Operations" : "Upcoming Missions";

            grid.innerHTML = '';

            database[type].forEach(event => {
                grid.innerHTML += `
                    <div class="event-card">
                        <img src="${event.img}" alt="${event.title}" class="event-img">
                        <div class="event-info">
                            <h3>${event.title}</h3>
                            <p>${event.desc}</p>
                        </div>
                        <div class="btn-group">
                            <a href="#" class="btn btn-know">Know More</a>
                            <a href="#" class="btn btn-register">Register</a>
                        </div>
                    </div>
                `;
            });
        }

        // Initialize with Ongoing
        window.onload = () => render('ongoing');
    </script>
    <style>
    .chat-widget { position: fixed; bottom: 30px; right: 30px; z-index: 9999; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .chat-toggle-btn { width: 65px; height: 65px; background-color: #ff6b00; color: white; border: none; border-radius: 50%; box-shadow: 0 4px 15px rgba(255, 107, 0, 0.4); cursor: pointer; font-size: 28px; display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease; }
    .chat-toggle-btn:hover { transform: scale(1.1); }
    .chat-window { display: none; position: absolute; bottom: 85px; right: 0; width: 350px; height: 500px; background-color: #ffffff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); flex-direction: column; overflow: hidden; border: 1px solid #ddd; }
    .chat-header { background-color: #111111; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .chat-header h4 { margin: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
    .chat-header i.fa-robot { color: #ff6b00; }
    .close-chat { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; }
    .chat-body { flex: 1; padding: 20px; overflow-y: auto; background-color: #f9f9f9; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; }
    .msg-bot { background-color: #eeeeee; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg-user { background-color: #ff6b00; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
    .chat-input-area { padding: 15px; background-color: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    .chat-input-area input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 0.95rem; }
    .chat-input-area input:focus { border-color: #ff6b00; }
    .chat-send-btn { background-color: #111111; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: background 0.3s; }
    .chat-send-btn:hover { background-color: #ff6b00; }
</style>

<div class="chat-widget">
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <h4><i class="fas fa-robot"></i> Global Tech Assistant</h4>
            <button class="close-chat" onclick="toggleChat()"><i class="fas fa-times"></i></button>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="msg msg-bot">Hello! I am the Global Tech AI. Try asking me about 'fees', 'dorms', 'salaries', or say 'Take me to admissions'.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask a question..." onkeypress="handleEnter(event)">
            <button class="chat-send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <button class="chat-toggle-btn" onclick="toggleChat()" aria-label="Open AI Assistant">
        <i class="fas fa-comment-dots"></i>
    </button>
</div>

<script>
    // --- UI Logic ---
    const chatWindow = document.getElementById('chatWindow');
    const chatBody = document.getElementById('chatBody');
    const userInput = document.getElementById('userInput');

    function toggleChat() {
        if (chatWindow.style.display === 'flex') {
            chatWindow.style.display = 'none';
        } else {
            chatWindow.style.display = 'flex';
        }
    }

    function handleEnter(event) {
        if (event.key === 'Enter') { sendMessage(); }
    }

    function sendMessage() {
        const text = userInput.value.trim();
        if (text === '') return;

        addMessage(text, 'user');
        userInput.value = '';

        setTimeout(() => {
            const botReply = generateBotResponse(text.toLowerCase());
            addMessage(botReply.text, 'bot');
            
            if (botReply.redirect) {
                setTimeout(() => { window.location.href = botReply.redirect; }, 1500);
            }
        }, 600); 
    }

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg msg-' + sender; // Foolproof string formatting
        msgDiv.innerText = text;
        chatBody.appendChild(msgDiv);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    // --- The Smarter "Brain" (Synonym Arrays) ---
    function generateBotResponse(input) {
        let response = { text: "", redirect: null };
        
        const containsAny = (wordsArray) => wordsArray.some(word => input.includes(word));

        // --- NAVIGATION COMMANDS ---
        if (containsAny(['take me', 'go to', 'redirect', 'open', 'show me'])) {
            if (containsAny(['admission', 'apply'])) {
                response.text = "Navigating you to the Admissions portal..."; response.redirect = "admissions.html";
            } else if (containsAny(['placement', 'job', 'career'])) {
                response.text = "Taking you to the Placements office..."; response.redirect = "placements.html";
            } else if (containsAny(['academic', 'course', 'major', 'degree'])) {
                response.text = "Opening our Academic programs..."; response.redirect = "academics.html";
            } else if (containsAny(['research', 'lab', 'urop'])) {
                response.text = "Heading over to Research & Innovation..."; response.redirect = "research.html";
            } else if (containsAny(['campus', 'life', 'dorm', 'hostel'])) {
                response.text = "Let's explore the Campus facilities..."; response.redirect = "campus.html";
            } else if (containsAny(['happening', 'event', 'fest'])) {
                response.text = "Redirecting you to Campus Happenings..."; response.redirect = "happenings.html";
            } else {
                response.text = "I couldn't find that page. Try asking to go to Admissions, Placements, or Campus!";
            }
            return response;
        }

        // --- INFORMATION COMMANDS ---
        if (containsAny(['fee', 'cost', 'tuition', 'price', 'pay', 'expensive'])) {
            response.text = "Tuition is $18,500/semester. We also offer merit-based scholarships up to 40% based on your application portfolio.";
        } 
        else if (containsAny(['hostel', 'dorm', 'housing', 'room', 'live', 'stay', 'bed'])) {
            response.text = "We provide Tier-1 residential housing featuring high-speed Wi-Fi, 24/7 security, and fully furnished rooms for all engineering students.";
        }
        else if (containsAny(['placement', 'stat', 'salary', 'job', 'recruit', 'hire', 'package'])) {
            response.text = "Our placement rate is 96%! The highest package this year is 28.4 LPA. Top recruiters include Google, Microsoft, Amazon, and Cisco.";
        } 
        else if (containsAny(['deadline', 'date', 'when'])) {
            response.text = "Early action closes Nov 15th. Regular Decision is January 10th.";
        }
        else if (containsAny(['academic', 'course', 'program', 'major', 'study'])) {
            response.text = "We offer programs in Embedded Systems & IoT, AR/VR & Spatial Computing, and Computer Science.";
        } 
        else if (containsAny(['hi', 'hello', 'hey', 'greetings'])) {
            response.text = "Hi there! I can explain our academics, admissions, placements, or navigate you to a specific page. Try typing: 'Take me to placements'.";
        } 
        else {
            response.text = "I am a prototype AI and I didn't quite catch that. Try asking about 'dorms', 'salaries', 'tuition', or say 'Take me to campus'.";
        }

        return response;
    }
</script>
</body>
</html>
